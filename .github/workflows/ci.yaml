---

name: Devops Pipeline

on: 
  push:
    branches:
      - master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Short SHA
        run:
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV  # Asigna los primeros 7 caracteres del SHA del commit a la variable de entorno SHORT_SHA
      - name: Build Docker Image
        run: |
          docker build -t jocgm09/devops-pipeline:${{ env.SHORT_SHA }} .
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Image
        run: |
          docker push jocgm09/devops-pipeline:${{ env.SHORT_SHA }}
      - name: Configure Git Author
        run: |
          git config --local user.name "jocgm09"
          git config --local user.email "jocgm09@gmail.com"
      - name: Update Helm Chart with new image tag
        run: |
          sed -i "s/tag:.*/tag: ${{ env.SHORT_SHA }}/" devops-pipeline-time-printer/values.yaml
          git add ./devops-pipeline-time-printer/values.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}"
          git push origin master
      

