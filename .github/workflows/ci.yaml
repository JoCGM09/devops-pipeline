---

name: Devops Pipeline

on: 
  push:
    branches:
      - master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Short SHA
        run:
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV  # Asigna los primeros 7 caracteres del SHA del commit a la variable de entorno SHORT_SHA
      - name: Build Docker Image
        run: |
          docker build -t jocgm09/devops-pipeline:${{ env.SHORT_SHA }} .
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Image
        run: |
          docker push jocgm09/devops-pipeline:${{ env.SHORT_SHA }}
      

